name: self-healing-fleet

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: shf-kafka
    ports:
      - "9094:9094" # client accessibile dall'host
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  spark-master:
    build: ./spark
    container_name: shf-spark-master
    # avvia il master (comportamento originale dell'immagine) + query_service.py
    # e detection_job.py in background: cosi' partono da soli con `docker
    # compose up`, senza `docker exec` manuali dopo il boot (Passo 13).
    command: ["bash", "/opt/shf/streaming/start-master.sh"]
    environment:
      - SPARK_MODE=master
    volumes:
      - ./config:/workspace/config:ro
      - ./streaming:/opt/shf/streaming
      - ./offline:/opt/shf/offline
      - ./predictive:/opt/shf/predictive
      - spark-ivy-cache:/opt/bitnami/spark/ivy-cache
      - shf-data:/data
    depends_on:
      - kafka
    ports:
      - "8080:8080" # Spark master UI
      - "7077:7077"
      - "5000:5000" # query_service (layer TAG, Passo 10)

  spark-worker:
    build: ./spark
    container_name: shf-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./config:/workspace/config:ro
      - ./streaming:/opt/shf/streaming
      - ./offline:/opt/shf/offline
      - shf-data:/data
    depends_on:
      - spark-master
    ports:
      - "8081:8081" # Spark worker UI

  backend:
    build: ./backend
    container_name: shf-backend
    environment:
      - QUERY_SERVICE_URL=http://spark-master:5000
      - GENERATOR_SERVICE_URL=http://ros:5001
      - KAFKA_BOOTSTRAP=kafka:9092
      - CONFIG_DIR=/workspace/config
      - EVAL_DIR=/data/eval
    volumes:
      - ./config:/workspace/config:ro
      - ./dashboard:/app/dashboard:ro
      - shf-data:/data:ro
    ports:
      - "3000:3000"
    depends_on:
      - kafka
      - spark-master
      - ros

  ros:
    build: ./ros
    container_name: shf-ros
    shm_size: "2gb"
    volumes:
      - ./config:/workspace/config:ro
      - ./ros/bags:/root/bags
      - ./generator:/opt/shf/generator
      - ./predictive:/opt/shf/predictive
      - ./test:/opt/shf/test
      - ./eval:/opt/shf/eval
      - shf-data:/data
    depends_on:
      - kafka
    ports:
      - "6080:6080" # noVNC (http://localhost:6080/vnc.html)
      - "11311:11311" # roscore
      - "5001:5001" # generator_service (pannello di controllo dashboard, Passo 11 estensione)

volumes:
  spark-ivy-cache:
  shf-data:
